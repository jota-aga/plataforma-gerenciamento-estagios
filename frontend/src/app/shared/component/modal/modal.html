@if (open) {
<div class="modal-backdrop" tabindex="0" role="button" (keydown.enter)="onBackdropClick()" (click)="onBackdropClick()">
    <div class="modal-content" tabindex="1" role="button" (keydown.enter)="$event.stopPropagation()"
        (click)="$event.stopPropagation()">
        <div class="modal-header">
            <h2 class="modal-title">
                {{ title }}
            </h2>
            <button type="button" class="modal-close" (click)="closeModal.emit()">×</button>
        </div>

        <div class="modal-body">
            <ng-content></ng-content>
        </div>
    </div>
</div>
}
